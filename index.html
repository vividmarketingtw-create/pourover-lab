<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="手沖咖啡實驗室 - 支援多種沖法。即時計算水量、調整粉水比，含計時器和沖煮步驟指引。">
<meta name="keywords" content="手沖咖啡,沖煮法,Pour Over,Kasuya,Hoffmann,Scott Rao,咖啡計算器,粉水比,V60">
<meta property="og:title" content="手沖咖啡實驗室 - 精準沖煮計算器 | Pour Over Lab">
<meta property="og:description" content="手沖咖啡實驗室 - 支援多種沖法。即時計算水量、調整粉水比，含計時器和沖煮步驟指引。">
<meta property="og:type" content="website">
<meta name="theme-color" content="#2C1A0E">
<title>手沖咖啡實驗室 | Pour Over Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F5EFE0; --brown-dark: #2C1A0E; --brown-mid: #5C3317;
    --brown-light: #A0622A; --amber: #D4892A; --gold: #E8B86D; --warm-white: #FBF6EE;
  }

  body {
    background: var(--brown-dark);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
    font-family: 'Noto Serif TC', serif; overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
    color: var(--gold);
  }

  body.light-mode {
    background: var(--cream);
    color: var(--brown-dark);
  }

  body.light-mode .page-h1 { color: var(--brown-dark); }
  body.light-mode .page-sub { color: rgba(44,26,14,0.6); }
  body.light-mode .selector-label { color: rgba(44,26,14,0.5); }
  body.light-mode .method-card {
    background: rgba(212,137,42,0.05); border-color: rgba(212,137,42,0.2);
  }
  body.light-mode .method-card:hover { background: rgba(212,137,42,0.15); }
  body.light-mode .method-card.active { background: rgba(212,137,42,0.25); border-color: rgba(212,137,42,0.6); }
  body.light-mode .method-name { color: var(--brown-dark); }
  body.light-mode .method-ratio { color: rgba(44,26,14,0.7); }
  body.light-mode .selector-card {
    background: rgba(255,255,255,0.5); border-color: rgba(212,137,42,0.15);
  }
  body.light-mode .selector-card input, body.light-mode .selector-card select {
    background: rgba(255,255,255,0.7); color: var(--brown-dark);
  }
  body.light-mode .calc-panel { background: rgba(255,255,255,0.4); }
  body.light-mode .timer-display { background: rgba(212,137,42,0.1); color: var(--brown-dark); }
  body.light-mode .btn-primary { color: var(--brown-dark); }
  body.light-mode .step-item { color: var(--brown-dark); border-left-color: rgba(212,137,42,0.3); }
  body.light-mode .guide-card { background: rgba(212,137,42,0.08); border-color: rgba(212,137,42,0.2); }
  body.light-mode .guide-section-title { color: var(--brown-dark); }
  body.light-mode .knowledge-tip { background: rgba(212,137,42,0.08); border-color: rgba(212,137,42,0.2); }
  body.light-mode .knowledge-tip-title { color: var(--brown-dark); }
  body.light-mode .knowledge-tip-text { color: rgba(44,26,14,0.75); }
  body.light-mode .compare-table { background: rgba(255,255,255,0.4); }
  body.light-mode .compare-table td { border-color: rgba(212,137,42,0.15); }
  body.light-mode .compare-header { background: rgba(212,137,42,0.15); color: var(--brown-dark); }
  body.light-mode .modal-content { background: var(--cream); border-color: rgba(212,137,42,0.3); }
  body.light-mode .modal-header { color: var(--brown-dark); }

  .page-h1 {
    font-size: 2.5em; font-family: 'Playfair Display', serif; margin: 30px 0 10px;
    color: var(--gold); text-align: center;
  }
  .page-sub { color: rgba(232, 184, 109, 0.7); text-align: center; margin-bottom: 30px; }
  .page-container { max-width: 900px; width: 100%; margin: 0 auto; }

  .mode-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(0,0,0,0.3); border: none; color: var(--gold);
    padding: 10px 15px; border-radius: 50px; cursor: pointer;
    font-size: 1em; transition: background 0.3s;
  }
  .mode-toggle:hover { background: rgba(0,0,0,0.5); }

  .method-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px; margin: 30px 0;
  }
  @media (min-width: 900px) {
    .method-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .method-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .page-h1 { font-size: 1.8em; margin: 20px 0 5px; }
  }

  .method-card {
    background: rgba(160, 98, 42, 0.2); border: 2px solid rgba(212,137,42,0.4);
    border-radius: 12px; padding: 15px; cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .method-card:hover {
    background: rgba(160, 98, 42, 0.4); border-color: rgba(212,137,42,0.8); transform: translateY(-2px);
  }
  .method-card.active {
    background: rgba(212,137,42,0.3); border-color: var(--amber); box-shadow: 0 0 20px rgba(212,137,42,0.3);
  }
  .method-badge { font-size: 0.75em; background: rgba(212,137,42,0.4); color: var(--warm-white);
    padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 8px;
  }
  .method-name { font-size: 1.1em; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
  .method-ratio { font-size: 0.85em; color: rgba(232,184,109,0.6); margin-bottom: 3px; }
  .method-desc { font-size: 0.8em; color: rgba(232,184,109,0.5); line-height: 1.4; }

  .selector-label { color: rgba(232,184,109,0.6); font-size: 0.9em; margin-top: 20px; margin-bottom: 8px; }
  .selector-card {
    background: rgba(160, 98, 42, 0.15); border: 1px solid rgba(212,137,42,0.2);
    border-radius: 8px; padding: 12px; margin-bottom: 15px;
  }
  .selector-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .selector-row label { flex: 1; font-size: 0.9em; color: rgba(232,184,109,0.7); }
  .selector-row input, .selector-row select {
    flex: 1; padding: 8px; border: 1px solid rgba(212,137,42,0.3);
    background: rgba(160, 98, 42, 0.2); color: var(--gold); border-radius: 6px;
    font-family: inherit; font-size: 0.9em;
  }
  .selector-row input::placeholder { color: rgba(232,184,109,0.3); }

  .calc-panel {
    background: rgba(160, 98, 42, 0.15); border: 1px solid rgba(212,137,42,0.2);
    border-radius: 8px; padding: 20px; margin: 20px 0;
  }
  .calc-title { font-size: 0.9em; color: rgba(232,184,109,0.6); margin-bottom: 12px; }
  .calc-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 15px;
  }
  .calc-item {
    background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px; text-align: center;
  }
  .calc-value { font-size: 1.5em; font-weight: 700; color: var(--amber); }
  .calc-label { font-size: 0.75em; color: rgba(232,184,109,0.5); margin-top: 5px; }

  .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary, .btn-secondary {
    padding: 10px 16px; border: none; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-size: 0.9em;
    transition: all 0.3s ease;
  }
  .btn-primary {
    background: var(--amber); color: var(--brown-dark); font-weight: 600;
  }
  .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
  .btn-secondary {
    background: rgba(212,137,42,0.3); color: var(--gold); border: 1px solid rgba(212,137,42,0.5);
  }
  .btn-secondary:hover { background: rgba(212,137,42,0.5); }

  .timer-display {
    background: rgba(212,137,42,0.15); border: 2px solid rgba(212,137,42,0.3);
    border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0;
    font-family: 'Courier New', monospace; color: var(--gold);
  }
  .timer-time { font-size: 3em; font-weight: 700; margin: 10px 0; letter-spacing: 2px; }
  .timer-label { font-size: 0.9em; color: rgba(232,184,109,0.6); }

  .steps-container {
    background: rgba(160, 98, 42, 0.15); border: 1px solid rgba(212,137,42,0.2);
    border-radius: 8px; padding: 20px; margin: 20px 0;
  }
  .steps-group-title {
    font-size: 0.95em; font-weight: 600; color: var(--gold); margin-top: 15px; margin-bottom: 10px;
  }
  .steps-group-title:first-child { margin-top: 0; }
  .steps-group-title::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 8px; background: var(--amber);
  }
  .steps-group-title.amber::before { background: var(--amber); }
  .steps-group-title.green::before { background: #22C55E; }

  .step-item {
    border-left: 3px solid rgba(212,137,42,0.4); padding-left: 15px; margin-bottom: 12px;
    padding-bottom: 12px; color: rgba(232,184,109,0.8);
  }
  .step-num { font-weight: 700; color: var(--amber); margin-bottom: 4px; }
  .step-time { font-size: 0.8em; color: rgba(212,137,42,0.6); }
  .step-title { font-size: 0.95em; font-weight: 600; color: var(--gold); margin: 4px 0; }
  .step-note { font-size: 0.85em; color: rgba(232,184,109,0.6); line-height: 1.4; margin-top: 4px; }
  .step-water { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .step-water-pour { background: rgba(212,137,42,0.25); color: var(--gold); font-weight: 700; font-size: 0.9em; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
  .step-water-cum { font-size: 0.82em; color: rgba(232,184,109,0.7); white-space: nowrap; }
  .step-water-bar { height: 4px; border-radius: 2px; background: rgba(212,137,42,0.15); flex: 1; min-width: 60px; overflow: hidden; }
  .step-water-bar-fill { height: 100%; border-radius: 2px; background: var(--amber); transition: width 0.3s; }
  body.light-mode .step-water-pour { background: rgba(139,90,43,0.15); color: var(--brown-dark); }
  body.light-mode .step-water-cum { color: rgba(139,90,43,0.6); }

  .guide-card {
    background: rgba(212,137,42,0.1); border: 1px solid rgba(212,137,42,0.3);
    border-radius: 8px; padding: 0; margin: 20px 0; overflow: hidden;
  }
  .guide-header {
    background: rgba(212,137,42,0.2); padding: 15px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: background 0.3s;
  }
  .guide-header:hover { background: rgba(212,137,42,0.3); }
  .guide-header-text { font-weight: 600; color: var(--gold); font-size: 0.95em; }
  .guide-toggle { color: var(--amber); font-size: 1.2em; transition: transform 0.3s; }
  .guide-toggle.open { transform: rotate(180deg); }
  .guide-content {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
    padding: 0 15px;
  }
  .guide-content.open {
    max-height: 3000px; padding: 15px;
  }
  .guide-section {
    margin-bottom: 15px; color: rgba(232,184,109,0.8);
  }
  .guide-section-title {
    font-weight: 600; color: var(--gold); font-size: 0.9em; margin-bottom: 6px;
  }
  .guide-section-text {
    font-size: 0.85em; line-height: 1.6; color: rgba(232,184,109,0.75);
  }
  .guide-section ul {
    list-style: none; padding-left: 0; margin-top: 6px;
  }
  .guide-section li {
    font-size: 0.85em; line-height: 1.5; margin-bottom: 4px;
    color: rgba(232,184,109,0.75); padding-left: 20px; position: relative;
  }
  .guide-section li::before {
    content: '•'; position: absolute; left: 8px; color: var(--amber);
  }

  .knowledge-tip {
    background: rgba(212,137,42,0.08); border: 1px solid rgba(212,137,42,0.25);
    border-radius: 6px; padding: 0; margin-bottom: 10px; overflow: hidden;
  }
  .knowledge-tip-header {
    padding: 10px 12px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
    transition: background 0.2s;
  }
  .knowledge-tip-header:hover { background: rgba(212,137,42,0.12); }
  .knowledge-tip-title {
    font-size: 0.85em; font-weight: 600; color: var(--amber);
    display: flex; align-items: center; gap: 6px;
  }
  .knowledge-tip-title::before { content: '💡'; font-size: 1em; }
  .knowledge-tip-toggle { color: rgba(212,137,42,0.6); font-size: 0.9em; }
  .knowledge-tip-toggle.open { transform: rotate(180deg); }
  .knowledge-tip-text {
    max-height: 0; overflow: hidden; transition: max-height 0.3s;
    color: rgba(232,184,109,0.7); font-size: 0.8em; line-height: 1.5;
  }
  .knowledge-tip-text.open {
    max-height: 500px; padding: 0 12px 10px 12px;
  }

  .compare-button-group {
    display: flex; gap: 10px; margin: 15px 0; justify-content: center;
  }
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 200; justify-content: center;
    align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: var(--brown-dark); border-radius: 12px; padding: 25px;
    max-width: 900px; width: 100%; max-height: 85vh; overflow-y: auto;
    border: 2px solid rgba(212,137,42,0.3);
  }
  .modal-header {
    font-size: 1.3em; font-weight: 600; color: var(--gold);
    margin-bottom: 20px; display: flex; justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none; border: none; color: var(--gold); font-size: 1.5em;
    cursor: pointer; padding: 0; width: 30px; height: 30px;
  }
  .compare-selector {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .compare-method-btn {
    padding: 10px; border: 2px solid rgba(212,137,42,0.3);
    background: rgba(160,98,42,0.15); color: var(--gold);
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    font-size: 0.85em; text-align: center;
  }
  .compare-method-btn:hover { border-color: rgba(212,137,42,0.6); }
  .compare-method-btn.selected {
    background: rgba(212,137,42,0.4); border-color: var(--amber);
  }
  .compare-table {
    width: 100%; border-collapse: collapse; margin-top: 15px;
    background: rgba(160,98,42,0.15); border-radius: 6px; overflow: hidden;
  }
  .compare-table th, .compare-table td {
    padding: 12px; text-align: left; border: 1px solid rgba(212,137,42,0.2);
    font-size: 0.85em;
  }
  .compare-header { background: rgba(212,137,42,0.25); color: var(--gold); font-weight: 600; }
  .compare-table td { color: rgba(232,184,109,0.8); }
  .compare-empty { text-align: center; color: rgba(232,184,109,0.4); padding: 30px 0; }

  .footer { margin-top: 40px; text-align: center; color: rgba(232,184,109,0.5);
    font-size: 0.8em; padding-bottom: 20px;
  }

  @media (max-width: 600px) {
    .page-h1 { font-size: 1.8em; }
    .timer-time { font-size: 2em; }
    .calc-grid { grid-template-columns: repeat(2, 1fr); }
    .modal-content { padding: 15px; }
  }
</style>
</head>
<body>
  <button class="mode-toggle" id="darkModeToggle">🌙</button>

  <div class="page-container">
    <h1 class="page-h1">手沖咖啡實驗室</h1>
    <p class="page-sub">精準計算 · 智慧推薦 · 完整指南</p>

    <!-- 豆子條件選擇 -->
    <div class="selector-card">
      <div class="selector-label">豆子特性</div>
      <div class="selector-row">
        <label>烘焙度</label>
        <select id="roastLevel">
          <option value="light">淺焙</option>
          <option value="medium" selected>中焙</option>
          <option value="dark">深焙</option>
        </select>
      </div>
      <div class="selector-row">
        <label>處理法</label>
        <select id="processing">
          <option value="washed" selected>水洗</option>
          <option value="natural">日曬</option>
          <option value="honey">蜜處理</option>
          <option value="anaerobic">厭氧</option>
        </select>
      </div>
      <div class="selector-row">
        <label>養豆天數</label>
        <input type="number" id="restDays" value="7" min="0" max="60">
      </div>
      <div class="selector-row">
        <label>風味偏好 (0=酸甜 ←→ 100=醇厚)</label>
        <input type="range" id="flavorPref" value="50" min="0" max="100" style="flex: 1;">
        <span id="flavorValue" style="width: 40px; text-align: center; color: var(--gold);">50</span>
      </div>
    </div>

    <!-- 知識提示 -->
    <div id="knowledgeTipsContainer"></div>

    <!-- 推薦結果 -->
    <div id="recommendationPanel" style="display:none;">
      <div class="selector-card" style="border-color: rgba(212,137,42,0.5); background: rgba(212,137,42,0.1);">
        <div style="color: var(--gold); font-weight: 600; margin-bottom: 10px;">💡 推薦沖法</div>
        <div id="recommendationText" style="color: rgba(232,184,109,0.8); font-size: 0.9em; line-height: 1.6;"></div>
      </div>
    </div>

    <!-- 沖法選擇 -->
    <div class="selector-label">選擇沖法</div>
    <div class="method-grid" id="methodGrid"></div>

    <div class="compare-button-group">
      <button class="btn-secondary" id="compareBtn">比較沖法</button>
    </div>

    <!-- 沖法指南 -->
    <div id="guideContainer"></div>

    <!-- 計算面板 -->
    <div class="calc-panel" id="calcPanel" style="display:none;">
      <div class="calc-title">⚙️ 沖煮參數</div>
      <div class="selector-row" style="margin-bottom: 15px;">
        <label>咖啡粉量 (g)</label>
        <input type="number" id="doseInput" value="20" min="5" max="100" step="0.5">
      </div>
      <div class="calc-grid" id="calcGrid"></div>
      <div class="button-group">
        <button class="btn-primary" id="startTimerBtn">開始計時</button>
        <button class="btn-secondary" id="copyRecipeBtn">複製配方</button>
      </div>
    </div>

    <!-- 計時器 -->
    <div class="timer-display" id="timerDisplay" style="display:none;">
      <div class="timer-label" id="timerLabel">準備中</div>
      <div class="timer-time" id="timerTime">0:00</div>
      <div class="button-group" style="justify-content: center; margin-top: 15px;">
        <button class="btn-primary" id="pausePlayBtn">暫停</button>
        <button class="btn-secondary" id="resetTimerBtn">重置</button>
      </div>
    </div>

    <!-- 沖煮步驟 -->
    <div class="steps-container" id="stepsContainer" style="display:none;">
      <div style="font-size: 0.95em; font-weight: 600; color: var(--gold); margin-bottom: 15px;">📋 沖煮步驟</div>
      <div id="stepsContent"></div>
    </div>

    <div class="footer">
      <p>版本 2.5 | 手沖咖啡實驗室 | Pour Over Coffee Lab</p>
      <p style="margin-top: 5px; font-size: 0.75em;">每次沖煮都是一場實驗。記錄、調整、發現最適合你的風味。</p>
    </div>
  </div>

  <!-- 比較模態框 -->
  <div class="modal-overlay" id="compareModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>比較沖法</span>
        <button class="modal-close" id="compareCloseBtn">&times;</button>
      </div>
      <div style="color: rgba(232,184,109,0.6); font-size: 0.9em; margin-bottom: 15px;">選擇最多2種沖法進行比較</div>
      <div class="compare-selector" id="compareMethodGrid"></div>
      <div id="compareResult"></div>
    </div>
  </div>

  <script>
const BREW_METHODS={sweet:{badge:'超高甜感',title:'超高甜感 · 搖晃濾杯法',desc:'透過搖晃增加甜感<br>圓潤飽滿 · 風味明顯',ratio:16,temp:'92°C',grind:'中細研磨',time:'2:45',buildSummary:(d,t)=>[{label:'第一段',value:Math.round(d*3.5),unit:'g'},{label:'第二段至',value:Math.round(t*0.6),unit:'g'},{label:'總水量',value:t,unit:'g'},{label:'目標時間',value:'2:45',unit:''}],buildSteps:(d,t)=>{const s1=Math.round(d*3.5),s2=Math.round(t*0.6)-s1,s34=t-Math.round(t*0.6),s3=Math.round(s34/2),s4=s34-s3;return{groups:[{label:'四段注水 + 搖晃',color:'amber',steps:[{num:1,time:'0:00',title:'第一段：快速注水 + 大幅搖晃',note:'立刻大幅搖晃濾杯約5秒',water:s1,cum:s1,duration:0},{num:2,time:'0:10',title:'第二段：稍快速度注水',note:'稍快速度注水，建立萃取基底',water:s2,cum:Math.round(t*0.6),duration:10},{num:3,time:'0:40',title:'第三段：放慢注水',note:'放慢注水，輕柔注入避免過度攪拌',water:s3,cum:Math.round(t*0.6)+s3,duration:40},{num:4,time:'1:20',title:'第四段：輕注收尾',note:'中心注水為主，輕注收尾',water:s4,cum:t,duration:20},{num:5,time:'注完後',title:'等待滴完',note:'不再搖晃，靜待自然滴完即可',water:0,cum:t,duration:90}]}]}}},kasuya:{badge:'卡薩亞',title:'Kasuya 4:6 · 世界冠軍法',desc:'精準控制甜酸比<br>可調性強 · 競賽配方',ratio:15,temp:'90°C',grind:'中粗研磨',time:'3:15',buildSummary:(d,t)=>[{label:'第一段',value:Math.round(t*0.2),unit:'g'},{label:'第二段',value:Math.round(t*0.2),unit:'g'},{label:'後三段',value:t-2*Math.round(t*0.2),unit:'g'},{label:'總水量',value:t,unit:'g'},{label:'目標時間',value:'3:15',unit:''}],buildSteps:(d,t)=>{const s1=Math.round(t*0.2),s2=Math.round(t*0.2),rest=t-s1-s2,s3=Math.round(rest/3),s4=Math.round(rest/3),s5=rest-s3-s4;return{groups:[{label:'五段注水法',color:'amber',steps:[{num:1,time:'0:00',title:'第一段',note:'等待水完全滴完再進下一段',water:s1,cum:s1,duration:0},{num:2,time:'0:45',title:'第二段',note:'決定甜酸比的關鍵段，等待滴完',water:s2,cum:s1+s2,duration:45},{num:3,time:'1:30',title:'第三段',note:'開始控制濃度，等待滴完',water:s3,cum:s1+s2+s3,duration:45},{num:4,time:'2:15',title:'第四段',note:'持續注水，等待滴完',water:s4,cum:s1+s2+s3+s4,duration:45},{num:5,time:'3:00',title:'第五段',note:'最後一段，完成沖煮',water:s5,cum:t,duration:45},{num:6,time:'注完後',title:'等待滴完',note:'靜待自然滴完即可',water:0,cum:t,duration:90}]}]}}},hoffmann:{badge:'霍夫曼',title:'James Hoffmann · 乾淨明亮法',desc:'簡潔均勻萃取<br>入門首選 · 明亮風味',ratio:16.7,temp:'94°C',grind:'中研磨',time:'3:00',buildSummary:(d,t)=>{const b=Math.round(d*2),f=Math.round(t*0.6);return[{label:'悶蒸水量',value:b,unit:'g'},{label:'注水至60%',value:f,unit:'g'},{label:'總水量',value:t,unit:'g'},{label:'目標時間',value:'3:00',unit:''}]},buildSteps:(d,t)=>{const b=Math.round(d*2),f=Math.round(t*0.6),s=t-f;return{groups:[{label:'悶蒸 + 兩段主注水',color:'amber',steps:[{num:1,time:'0:00',title:'悶蒸注水',note:'輕輕旋轉濾杯讓所有咖啡粉濕潤',water:b,cum:b,duration:0},{num:2,time:'0:45',title:'第一次主注水',note:'穩定中心繞圈注水，約30秒內完成',water:f-b,cum:f,duration:45},{num:3,time:'1:15',title:'第二次主注水',note:'同樣手法繼續注水，約30秒內完成',water:s,cum:t,duration:30},{num:4,time:'1:45',title:'攪拌與搖晃',note:'用攪拌棒順時針、逆時針各攪拌一圈',water:0,cum:t,duration:0},{num:5,time:'注完後',title:'等待滴完',note:'靜待自然滴完，整體時間約3:00',water:0,cum:t,duration:90}]}]}}},rao:{badge:'雷歐',title:'Scott Rao · 螺旋渦流法',desc:'螺旋渦流均勻萃取<br>進階技巧 · 醇厚層次',ratio:15,temp:'91°C',grind:'中研磨',time:'3:00',buildSummary:(d,t)=>{const b=Math.round(d*2);return[{label:'悶蒸水量',value:b,unit:'g'},{label:'主注水',value:t-b,unit:'g'},{label:'總水量',value:t,unit:'g'},{label:'目標時間',value:'3:00',unit:''}]},buildSteps:(d,t)=>{const b=Math.round(d*2),m=t-b;return{groups:[{label:'悶蒸 + 螺旋連續注水',color:'amber',steps:[{num:1,time:'0:00',title:'悶蒸注水',note:'等待45秒讓CO2充分釋放',water:b,cum:b,duration:0},{num:2,time:'0:45',title:'螺旋渦流注水',note:'從中心開始，以螺旋方式由內向外繞圈注水',water:m,cum:t,duration:90},{num:3,time:'注完後',title:'收尾與等待',note:'輕搖濾杯讓粉床平整，靜待自然滴完',water:0,cum:t,duration:90}]}]}}},onePour:{badge:'一刀流',title:'一刀流 · 單次注水法',desc:'極簡操作，穩定出品<br>新手友善 · 單次注水',ratio:15,temp:'92°C',grind:'中細研磨',time:'2:30',buildSummary:(d,t)=>{const b=Math.round(d*2);return[{label:'悶蒸水量',value:b,unit:'g'},{label:'主注水',value:t-b,unit:'g'},{label:'目標時間',value:'2:30',unit:''},{label:'總水量',value:t,unit:'g'}]},buildSteps:(d,t)=>{const b=Math.round(d*2);return{groups:[{label:'悶蒸 + 單次注水',color:'amber',steps:[{num:1,time:'0:00',title:'悶蒸注水',note:'等待30秒讓咖啡粉充分濕潤',water:b,cum:b,duration:0},{num:2,time:'0:30',title:'一次注水完成',note:'穩定、不間斷地持續注水',water:t-b,cum:t,duration:30},{num:3,time:'注完後',title:'等待滴完',note:'不攪拌、不搖晃，等待自然滴完',water:0,cum:t,duration:90}]}]}}},icedBrew:{badge:'冰手沖',title:'Flash Brew 冰手沖',desc:'急速冷卻鎖住香氣<br>夏日必備 · 果香爆發',ratio:15,temp:'96°C',grind:'中細偏細',time:'2:30',buildSummary:(d,t)=>{const i=Math.round(t*0.4),h=t-i,b=Math.round(d*2.5);return[{label:'冰塊量',value:i,unit:'g'},{label:'熱水量',value:h,unit:'g'},{label:'悶蒸水量',value:b,unit:'g'},{label:'總液量',value:t,unit:'g'}]},buildSteps:(d,t)=>{const i=Math.round(t*0.4),h=t-i,b=Math.round(d*2.5),m=h-b;return{groups:[{label:'準備 — 冰塊置入下壺',color:'green',steps:[{num:0,time:'準備',title:'放入冰塊',note:'在下壺或馬克杯中放入冰塊',water:i,cum:i,duration:-1}]},{label:'沖煮 — 高溫濃縮萃取',color:'amber',steps:[{num:1,time:'0:00',title:'悶蒸注水',note:'高溫悶蒸（96°C），等待30秒',water:b,cum:b,duration:0},{num:2,time:'0:30',title:'主注水',note:'穩定注水（僅計熱水），約60秒完成',water:m,cum:h,duration:30},{num:3,time:'注完後',title:'等待滴完並冷卻',note:'咖啡液滴入冰塊中急速冷卻，完成後輕搖杯子',water:0,cum:t,duration:90}]}]}}}};

const KNOWLEDGE_TIPS=[{condition:(r,p,d,f)=>r==='light',title:'淺焙豆小知識',text:'淺焙豆密度較高，需要較高水溫（90°C以上）才能有效萃取。如果覺得酸味太尖銳，試試提高水溫而不是加長時間。'},{condition:(r,p,d,f)=>r==='dark',title:'深焙豆小知識',text:'深焙豆結構疏鬆，萃取速度快。降低水溫和加粗研磨是避免苦澀的關鍵。整體沖煮時間建議比淺焙短15-20%。'},{condition:(r,p,d,f)=>p==='natural',title:'日曬豆小知識',text:'日曬處理讓果肉糖分滲入豆體，甜度高但容易過萃變膩。建議研磨比同烘焙度的水洗豆粗半格到一格。'},{condition:(r,p,d,f)=>p==='anaerobic',title:'厭氧豆小知識',text:'厭氧發酵豆風味強烈獨特，建議略降水溫（降1-2°C）和略粗研磨，避免風味過於衝擊。用簡潔的沖法更能展現複雜度。'},{condition:(r,p,d,f)=>p==='honey',title:'蜜處理豆小知識',text:'蜜處理依果膠保留量分黃蜜、紅蜜、黑蜜。黑蜜接近日曬的豐富度，黃蜜接近水洗的乾淨感。可用標準研磨度作為起點。'},{condition:(r,p,d,f)=>r==='light'&&d<7,title:'養豆提醒',text:'淺焙豆建議養豆7-14天。目前天數較短，CO2仍在大量釋放，悶蒸會膨脹劇烈，可延長悶蒸時間至45-50秒讓排氣更充分。'},{condition:(r,p,d,f)=>r==='dark'&&d>14,title:'新鮮度提醒',text:'深焙豆最佳賞味期較短（烘焙後4-14天）。超過14天風味可能已開始衰減，建議磨細半格並適當提高水溫來補償。'},{condition:(r,p,d,f)=>f<30,title:'追求明亮風味',text:'偏好酸甜明亮的風味時，萃取率控制在18-20%最理想。可以用較高水溫搭配較短沖煮時間，保留前段的果酸和花香。'},{condition:(r,p,d,f)=>f>70,title:'追求醇厚風味',text:'偏好醇厚飽滿時，可以將粉水比降至1:14-1:15，並適當延長沖煮時間。中段的焦糖和巧克力風味會更明顯。'},{condition:(r,p,d,f)=>r==='light'&&p==='natural',title:'淺焙日曬組合',text:'這是風味最豐富的組合之一！建議用Kasuya 4:6法，透過前40%的分配來精準控制莓果甜感和明亮酸質的比例。'},{condition:(r,p,d,f)=>r==='medium'&&p==='washed',title:'中焙水洗組合',text:'最經典的組合，容錯範圍大。任何沖法都能有好表現，很適合作為練習和對比實驗的基準。'}];
const METHOD_COMPARE={sweet:{difficulty:'中等',flavorProfile:'甜感突出、圓潤',suitableRoast:'中深焙、深焙',keyTechnique:'搖晃濾杯',pourStages:'4段'},kasuya:{difficulty:'中等',flavorProfile:'可調控甜酸比',suitableRoast:'淺焙、中焙',keyTechnique:'分段等待滴完',pourStages:'5段'},hoffmann:{difficulty:'入門',flavorProfile:'乾淨明亮',suitableRoast:'淺焙',keyTechnique:'攪拌+搖晃拉平',pourStages:'2段'},rao:{difficulty:'進階',flavorProfile:'醇厚有層次',suitableRoast:'中焙',keyTechnique:'螺旋渦流',pourStages:'連續'},onePour:{difficulty:'入門',flavorProfile:'乾淨穩定',suitableRoast:'中焙',keyTechnique:'單次不間斷注水',pourStages:'1段'},icedBrew:{difficulty:'中等',flavorProfile:'冰涼果香',suitableRoast:'淺焙',keyTechnique:'冰塊急速冷卻',pourStages:'2段'}};
const GUIDE_CONTENT={sweet:{origin:'源自台灣咖啡社群，強調透過低溫和搖晃濾杯的方式，最大化咖啡的甜感表現。',concept:'利用搖晃濾杯增加萃取均勻度，配合較低水溫（約92°C），減少苦味物質溶出，凸顯甜感。',details:['第一段：快速注入約粉量3.5倍的水，立刻大幅搖晃濾杯約5秒','第二段：稍快速度注水至總水量60%，建立萃取基底','第三、四段：放慢注水速度，輕柔注入，避免過度攪拌','注水手法：中心注水為主，避免直接沖到濾紙'],suitableBean:'中深焙、蜜處理豆最能發揮此沖法的甜感特色；日曬豆也很適合',unsuitable:'極淺焙水洗豆（甜感不夠明顯，容易變得平淡）',faq:[{q:'太酸',a:'水溫提高2°C，或將研磨調細半格'},{q:'太苦',a:'水溫降低2°C，減少搖晃力度'},{q:'太淡',a:'增加粉量或將粉水比調至1:14'},{q:'風味模糊',a:'搖晃需更果斷有力，確保粉層均勻翻動'}]},kasuya:{origin:'由日本咖啡師粕谷哲（Tetsu Kasuya）發明，2016年世界沖煮杯（World Brewers Cup）冠軍配方。',concept:'將總水量分為前40%和後60%。前40%決定甜酸比例，後60%平均分三段，決定濃淡強度。',details:['研磨度比一般V60稍粗，接近法壓壺的粗細','每段注水後必須等水完全滴完再注下一段','由中心螺旋向外注水，避免直接沖濾紙','前兩段（40%）是風味關鍵，注水量分配決定甜酸比','後三段（60%）平均分配，控制濃度'],suitableBean:'日曬淺焙豆最能展現此沖法的精準控制力；各種處理法的淺中焙都適合',unsuitable:'深焙豆（分段等待容易過萃產生苦澀）',faq:[{q:'太酸',a:'第一段減少水量讓甜感上升'},{q:'太苦',a:'磨粗一格，或將水溫降低2°C'},{q:'總時間超過3:30',a:'研磨太細，需調粗'},{q:'風味不一致',a:'確認每段都等完全滴完再注下一段'}]},hoffmann:{origin:'由英國咖啡專家 James Hoffmann 提出，以簡潔的操作和高度均勻的萃取著稱。',concept:'透過充分悶蒸、兩段式注水、最後的攪拌與搖晃，達到咖啡粉的均勻萃取，追求乾淨明亮的風味。',details:['悶蒸：注入粉量2倍的水，輕輕旋轉濾杯讓所有咖啡粉濕潤，等待45秒','第一次主注水：在45秒時開始，注水至總水量60%，約30秒內完成','第二次主注水：注水至總水量100%，約30秒內完成','攪拌：注水完成後，用攪拌棒順時針、逆時針各攪拌一圈','搖晃：輕搖濾杯讓粉床平整，等待自然滴完','注水手法：穩定的中心繞圈注水，保持適中高度和水流'],suitableBean:'水洗淺焙豆最能展現乾淨明亮的風味；厭氧處理豆也適合用簡潔的流程展現複雜度',unsuitable:'深焙豆（高水溫容易萃取過度）',faq:[{q:'太酸',a:'研磨調細半格，或延長總沖煮時間'},{q:'太苦',a:'減少攪拌力度，或水溫降低2°C'},{q:'太淡',a:'粉水比從1:16.7改為1:15'},{q:'滴完時間太長',a:'研磨太細，需調粗'}]},rao:{origin:'由美國咖啡專家 Scott Rao 提出，強調透過持續的螺旋攪拌達到高萃取率和均勻萃取。',concept:'注水時製造明顯的螺旋渦流，讓水均勻通過所有咖啡粉，追求層次豐富、有厚度的口感。',details:['悶蒸：注入粉量2倍的水，等待45秒讓CO2充分釋放','主注水：從中心開始，以螺旋方式由內向外繞圈，保持穩定的水流和高度','渦流的關鍵：注水時水柱要能在粉床上製造可見的旋轉渦流','收尾：注水完成後輕搖濾杯讓粉床平整','目標時間：整體沖煮在3分鐘左右完成'],suitableBean:'中焙豆最能展現平衡醇厚的特色；適合追求高萃取率的進階沖煮者',unsuitable:'極淺焙豆（容易過度攪拌導致澀感）',faq:[{q:'太苦/澀',a:'降低注水高度，減緩渦流強度'},{q:'太酸',a:'增加注水高度，讓渦流更明顯'},{q:'風味雜亂',a:'保持螺旋的一致性，不要忽快忽慢'},{q:'總時間太短',a:'研磨太粗，需調細'}]},onePour:{origin:'最簡約的手沖方式，去除複雜的分段注水，用一次穩定的注水完成萃取。',concept:'減少人為變數，讓水自然均勻通過咖啡粉層。操作越簡單，變數越少，出品越穩定。',details:['悶蒸30秒後，以穩定的水流一次注完剩餘水量','水流保持細且穩定，由中心緩慢向外繞圈','不需要暫停、不需要分段、不需要攪拌','全程保持相同的注水高度和速度'],suitableBean:'中焙豆最適合，容錯範圍大；也適合作為新豆子的「基準測試」沖法',unsuitable:'需要精細控制甜酸比的場景（用Kasuya更好）',faq:[{q:'太淡',a:'放慢注水速度，讓水與粉接觸更久'},{q:'太苦',a:'加快注水速度，減少浸泡時間'},{q:'風味單調',a:'一刀流的特色就是乾淨穩定，想要更多層次可嘗試其他沖法'}]},icedBrew:{origin:'Flash Brew（急速冷卻法）是日式冰咖啡的延伸，透過將熱咖啡直接沖在冰塊上。',concept:'用較少的熱水進行高濃度萃取，再透過冰塊稀釋至正常濃度。急速冷卻能保留更多花果香氣。',details:['總水量的40%用冰塊替代，放在下壺中','用剩餘60%的熱水進行沖煮（水溫96°C，盡量高溫）','研磨比一般手沖細一格，彌補水量減少導致的萃取不足','悶蒸用粉量2.5倍的水（比一般多一點），確保充分萃取','沖完後輕搖杯子讓殘餘冰塊融化均勻'],suitableBean:'淺焙水洗豆的花果香在冰手沖中表現最驚豔；日曬淺焙的莓果調性也很適合',unsuitable:'深焙豆（冰鎮後苦味會更突出）',faq:[{q:'太淡/水感',a:'增加粉量（如1:13），或減少冰塊比例至35%'},{q:'太酸/尖銳',a:'研磨再細半格，或延長主注水時間'},{q:'冰塊融不完',a:'正常現象，可以保留作為飲用時的冰塊'},{q:'不夠冰',a:'確保冰塊是實心冰塊而非碎冰，保冷效果更好'}]}};
const RECOMMENDATIONS={'light-washed-bright':{method:'hoffmann',reason:'淺焙水洗豆適合用簡潔的沖法來展現清爽明亮的風味。Hoffmann法透過充分悶蒸和均勻萃取，能最好地凸顯淺焙豆的花香和果酸。'},'light-natural':{method:'kasuya',reason:'淺焙日曬豆風味豐富，用Kasuya 4:6法能精準控制前40%的甜酸比，充分發揮日曬豆的莓果和蜜甜特色。'},'medium-washed':{method:'onePour',reason:'中焙水洗豆是最經典的組合，一刀流以簡單穩定著稱，容錯範圍大，適合練習和實驗。'},dark:{method:'sweet',reason:'深焙豆用搖晃濾杯法能強化甜感，低溫沖煮能減少苦澀，發揮深焙的焦糖和巧克力調性。'},default:{method:'onePour',reason:'一刀流穩定易掌控，是發現新豆子特色的最佳起點。'}};
let selectedMethod=null,timerInterval=null,timerSeconds=0,timerRunning=false,selectedCompareMethods=[];
function init(){renderMethodCards();attachEventListeners();updateRecommendation();updateKnowledgeTips()}
function renderMethodCards(){const g=document.getElementById('methodGrid');g.innerHTML='';Object.entries(BREW_METHODS).forEach(([k,m])=>{const c=document.createElement('div');c.className='method-card';c.innerHTML=`<div class="method-badge">${m.badge}</div><div class="method-name">${m.title.split(' · ')[0]}</div><div class="method-ratio">${m.ratio}:1 · ${m.time}</div><div class="method-desc">${m.desc}</div>`;c.addEventListener('click',()=>selectMethod(k,m));g.appendChild(c)})}
function selectMethod(k,m){selectedMethod=k;document.querySelectorAll('.method-card').forEach(c=>c.classList.remove('active'));event.target.closest('.method-card').classList.add('active');document.getElementById('calcPanel').style.display='block';document.getElementById('stepsContainer').style.display='block';showGuide(k,m);updateCalcPanel(m);updateSteps(m)}
function updateCalcPanel(m){const d=parseFloat(document.getElementById('doseInput').value)||20,t=Math.round(d*m.ratio),s=m.buildSummary(d,t),g=document.getElementById('calcGrid');g.innerHTML=s.map(i=>`<div class="calc-item"><div class="calc-value">${i.value}</div><div class="calc-label">${i.label}</div>${i.unit?`<div class="calc-label">${i.unit}</div>`:''}</div>`).join('')}
function updateSteps(m){const d=parseFloat(document.getElementById('doseInput').value)||20,t=Math.round(d*m.ratio),sd=m.buildSteps(d,t);let h='';sd.groups.forEach(g=>{h+=`<div class="steps-group-title ${g.color}">${g.label}</div>`;g.steps.forEach(s=>{let wb='';if(s.water>0){const pct=Math.round((s.cum/t)*100);wb=`<div class="step-water"><div class="step-water-pour">+${s.water}g</div><div class="step-water-cum">累計 ${s.cum}g / ${t}g</div><div class="step-water-bar"><div class="step-water-bar-fill" style="width:${pct}%"></div></div></div>`}h+=`<div class="step-item"><div class="step-num">步驟 ${s.num}</div><div class="step-time">${s.time}</div><div class="step-title">${s.title}</div>${wb}<div class="step-note">${s.note}</div></div>`})});document.getElementById('stepsContent').innerHTML=h}
function showGuide(k,m){const g=GUIDE_CONTENT[k],gd=[{title:'方法起源',text:g.origin},{title:'核心理念',text:g.concept},{title:'操作細節',text:g.details.join('\n')},{title:'適合豆子',text:g.suitableBean},{title:'不太適合',text:g.unsuitable},{title:'常見問題',text:g.faq.map(f=>`${f.q}: ${f.a}`).join('\n')}],gc=document.getElementById('guideContainer');gc.innerHTML=`<div class="guide-card"><div class="guide-header"><div class="guide-header-text">沖法指南</div><div class="guide-toggle">▼</div></div><div class="guide-content">${gd.map(s=>`<div class="guide-section"><div class="guide-section-title">${s.title}</div><div class="guide-section-text">${s.text.includes('\n')?'<ul>'+s.text.split('\n').map(l=>`<li>${l}</li>`).join('')+'</ul>':s.text.replace(/\n/g,'<br>')}</div></div>`).join('')}</div></div>`;const h=gc.querySelector('.guide-header'),c=gc.querySelector('.guide-content'),t=gc.querySelector('.guide-toggle');h.addEventListener('click',()=>{c.classList.toggle('open');t.classList.toggle('open')})}
function updateRecommendation(){const r=document.getElementById('roastLevel').value,p=document.getElementById('processing').value,f=parseInt(document.getElementById('flavorPref').value);let k='default';r==='light'&&p==='washed'&&f<50?k='light-washed-bright':r==='light'&&p==='natural'?k='light-natural':r==='medium'&&p==='washed'?k='medium-washed':r==='dark'&&(k='dark');const rec=RECOMMENDATIONS[k],rp=document.getElementById('recommendationPanel'),rt=document.getElementById('recommendationText');rp.style.display='block';rt.innerHTML=`<strong>${BREW_METHODS[rec.method].title}</strong><br>${rec.reason}`}
function updateKnowledgeTips(){const r=document.getElementById('roastLevel').value,p=document.getElementById('processing').value,d=parseInt(document.getElementById('restDays').value)||7,f=parseInt(document.getElementById('flavorPref').value),mt=KNOWLEDGE_TIPS.filter(t=>t.condition(r,p,d,f)).slice(0,2),ktc=document.getElementById('knowledgeTipsContainer');if(mt.length===0){ktc.innerHTML='';return}ktc.innerHTML=mt.map((t,i)=>`<div class="knowledge-tip" id="tip-${i}"><div class="knowledge-tip-header"><div class="knowledge-tip-title">${t.title}</div><div class="knowledge-tip-toggle">▼</div></div><div class="knowledge-tip-text">${t.text}</div></div>`).join('');mt.forEach((_,i)=>{const el=document.getElementById(`tip-${i}`),h=el.querySelector('.knowledge-tip-header'),c=el.querySelector('.knowledge-tip-text'),tg=el.querySelector('.knowledge-tip-toggle');h.addEventListener('click',()=>{c.classList.toggle('open');tg.classList.toggle('open')})})}
function attachEventListeners(){document.getElementById('doseInput').addEventListener('change',()=>{if(selectedMethod){updateCalcPanel(BREW_METHODS[selectedMethod]);updateSteps(BREW_METHODS[selectedMethod])}});document.getElementById('roastLevel').addEventListener('change',()=>{updateRecommendation();updateKnowledgeTips()});document.getElementById('processing').addEventListener('change',()=>{updateRecommendation();updateKnowledgeTips()});document.getElementById('restDays').addEventListener('change',()=>{updateKnowledgeTips()});document.getElementById('flavorPref').addEventListener('input',(e)=>{document.getElementById('flavorValue').textContent=e.target.value;updateRecommendation();updateKnowledgeTips()});document.getElementById('startTimerBtn').addEventListener('click',startTimer);document.getElementById('pausePlayBtn').addEventListener('click',toggleTimer);document.getElementById('resetTimerBtn').addEventListener('click',resetTimer);document.getElementById('copyRecipeBtn').addEventListener('click',copyRecipe);document.getElementById('darkModeToggle').addEventListener('click',toggleDarkMode);document.getElementById('compareBtn').addEventListener('click',()=>{selectedCompareMethods=[];renderCompareModal();document.getElementById('compareModal').classList.add('active')});document.getElementById('compareCloseBtn').addEventListener('click',()=>{document.getElementById('compareModal').classList.remove('active')});document.getElementById('compareModal').addEventListener('click',(e)=>{if(e.target===document.getElementById('compareModal'))document.getElementById('compareModal').classList.remove('active')})}
function startTimer(){if(!selectedMethod){alert('請先選擇沖法');return}document.getElementById('timerDisplay').style.display='block';timerSeconds=0;timerRunning=true;updateTimerDisplay();timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay()},1000)}
function toggleTimer(){timerRunning=!timerRunning;document.getElementById('pausePlayBtn').textContent=timerRunning?'暫停':'繼續';if(timerRunning){timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay()},1000)}else{clearInterval(timerInterval)}}
function resetTimer(){timerSeconds=0;timerRunning=false;document.getElementById('pausePlayBtn').textContent='暫停';clearInterval(timerInterval);updateTimerDisplay();document.getElementById('timerDisplay').style.display='none'}
function updateTimerDisplay(){const m=Math.floor(timerSeconds/60),s=timerSeconds%60;document.getElementById('timerTime').textContent=`${m}:${s.toString().padStart(2,'0')}`}
function copyRecipe(){if(!selectedMethod)return;const d=parseFloat(document.getElementById('doseInput').value)||20,t=Math.round(d*BREW_METHODS[selectedMethod].ratio),m=BREW_METHODS[selectedMethod],text=`沖法: ${m.title}\n粉量: ${d}g\n水量: ${t}g\n粉水比: 1:${m.ratio}\n水溫: ${m.temp}\n研磨度: ${m.grind}\n預期時間: ${m.time}`;navigator.clipboard.writeText(text).then(()=>{alert('配方已複製')})}
function toggleDarkMode(){document.body.classList.toggle('light-mode');const isDark=!document.body.classList.contains('light-mode');localStorage.setItem('darkMode',isDark);document.getElementById('darkModeToggle').textContent=isDark?'🌙':'☀️'}
function renderCompareModal(){const cmg=document.getElementById('compareMethodGrid');cmg.innerHTML=Object.entries(BREW_METHODS).map(([k,m])=>`<button class="compare-method-btn" data-method="${k}">${m.title.split(' · ')[0]}<br><small>${m.badge}</small></button>`).join('');document.querySelectorAll('.compare-method-btn').forEach(btn=>{btn.addEventListener('click',()=>{const method=btn.dataset.method;if(selectedCompareMethods.includes(method)){selectedCompareMethods=selectedCompareMethods.filter(m=>m!==method);btn.classList.remove('selected')}else if(selectedCompareMethods.length<2){selectedCompareMethods.push(method);btn.classList.add('selected')}else{alert('最多只能選擇2種沖法');return}updateCompareResult()})})}
function updateCompareResult(){const cr=document.getElementById('compareResult');if(selectedCompareMethods.length===0){cr.innerHTML='<div class="compare-empty">選擇沖法開始比較</div>';return}const m=selectedCompareMethods.map(k=>({key:k,data:BREW_METHODS[k]})),hr=`<tr class="compare-header"><th>項目</th>${m.map(x=>`<th>${x.data.title.split(' · ')[0]}</th>`).join('')}</tr>`,rows=[{label:'難易度',values:m.map(x=>METHOD_COMPARE[x.key].difficulty)},{label:'風味走向',values:m.map(x=>METHOD_COMPARE[x.key].flavorProfile)},{label:'適合烘焙度',values:m.map(x=>METHOD_COMPARE[x.key].suitableRoast)},{label:'核心技巧',values:m.map(x=>METHOD_COMPARE[x.key].keyTechnique)},{label:'注水段數',values:m.map(x=>METHOD_COMPARE[x.key].pourStages)},{label:'粉水比',values:m.map(x=>`1:${x.data.ratio}`)},{label:'水溫',values:m.map(x=>x.data.temp)},{label:'預期時間',values:m.map(x=>x.data.time)}];cr.innerHTML=`<table class="compare-table">${hr}${rows.map(row=>`<tr><td><strong>${row.label}</strong></td>${row.values.map(val=>`<td>${val}</td>`).join('')}</tr>`).join('')}</table>`}
const darkMode=localStorage.getItem('darkMode')!=='false';if(!darkMode)document.body.classList.add('light-mode');document.getElementById('darkModeToggle').textContent=darkMode?'🌙':'☀️';
init();
  </script>
</body>
</html>
