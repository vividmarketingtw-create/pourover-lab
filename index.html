<title>手沖咖啡實驗室 | Pour Over Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F5EFE0; --brown-dark: #2C1A0E; --brown-mid: #5C3317;
    --brown-light: #A0622A; --amber: #D4892A; --gold: #E8B86D; --warm-white: #FBF6EE;
  }

  body {
    background: var(--brown-dark);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
    font-family: 'Noto Serif TC', serif; overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  body.light-mode {
    background: var(--cream);
    color: var(--brown-dark);
  }

  body.light-mode .page-h1 { color: var(--brown-dark); }
  body.light-mode .page-sub { color: rgba(44,26,14,0.6); }
  body.light-mode .selector-label { color: rgba(44,26,14,0.5); }
  body.light-mode .method-card {
    background: rgba(212,137,42,0.05); border-color: rgba(212,137,42,0.2);
  }
  body.light-mode .method-card:hover { background: rgba(212,137,42,0.15); }
  body.light-mode .method-name { color: var(--brown-dark); }
  body.light-mode .method-ratio { color: rgba(44,26,14,0.6); }

  @keyframes fadeInSlide {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulseLight {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  body > * {
    animation: fadeInSlide 0.6s ease-out forwards;
  }

  .page-header { animation-delay: 0.1s; }
  .method-selector { animation-delay: 0.2s; }
  .calculator { animation-delay: 0.3s; }
  .timer-section { animation-delay: 0.4s; }

  .dark-mode-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 1000;
    background: rgba(255,255,255,0.1); border: 1px solid var(--amber);
    color: var(--gold); padding: 10px 14px; border-radius: 20px;
    cursor: pointer; font-size: 18px; transition: all 0.3s ease;
    font-family: 'Playfair Display', serif;
  }

  .dark-mode-toggle:hover {
    background: rgba(212,137,42,0.2);
    transform: scale(1.05);
  }

  body.light-mode .dark-mode-toggle {
    background: rgba(44,26,14,0.1); border-color: var(--brown-light);
    color: var(--brown-light);
  }

  .page-header { width: 100%; max-width: 820px; text-align: center; padding: 32px 0 28px; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--amber); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
  .page-h1 { font-size: 34px; font-weight: 900; color: var(--warm-white); margin-bottom: 8px; transition: color 0.3s ease; }
  .page-sub { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 1px; transition: color 0.3s ease; }

  .method-selector { width: 100%; max-width: 820px; margin-bottom: 28px; }
  .selector-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 12px; text-align: center; transition: color 0.3s ease; }
  .method-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .method-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(212,137,42,0.2);
    border-radius: 16px; padding: 16px 12px; text-align: center; cursor: pointer;
    transition: all 0.3s ease, transform 0.2s ease;
    touch-action: manipulation;
  }
  .method-card:hover { background: rgba(212,137,42,0.1); border-color: rgba(212,137,42,0.5); transform: translateY(-4px); }
  .method-card:active { transform: translateY(-2px); }
  .method-card.active { background: var(--amber); border-color: var(--amber); box-shadow: 0 6px 20px rgba(212,137,42,0.4); }
  .method-card.active .method-name { color: var(--brown-dark); }
  .method-card.active .method-ratio { color: rgba(44,26,14,0.7); }
  .method-card.active .method-tag { background: rgba(44,26,14,0.15); color: var(--brown-dark); }
  .method-icon { font-size: 22px; margin-bottom: 6px; }
  .method-name { font-size: 12px; font-weight: 900; color: var(--warm-white); margin-bottom: 4px; line-height: 1.3; transition: color 0.3s ease; }
  .method-ratio { font-size: 10px; color: rgba(255,255,255,0.45); margin-bottom: 6px; transition: color 0.3s ease; }
  .method-tag { display: inline-block; font-size: 9px; background: rgba(212,137,42,0.15); color: var(--gold); padding: 2px 8px; border-radius: 10px; transition: all 0.3s ease; }

  .calculator {
    width: 100%; max-width: 820px; background: var(--cream); border-radius: 24px;
    padding: 28px; box-shadow: 0 30px 80px rgba(0,0,0,0.6); margin-bottom: 16px;
    transition: background-color 0.3s ease;
  }

  body.light-mode .calculator { background: rgba(245,239,224,0.5); color: var(--brown-dark); }

  .calc-method-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding-bottom: 16px; border-bottom: 1px solid rgba(44,26,14,0.1); flex-wrap: wrap;
  }
  .calc-method-badge { background: var(--brown-dark); color: var(--gold); font-size: 9px; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .calc-method-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--brown-dark); }
  .calc-method-desc { font-size: 11px; color: rgba(44,26,14,0.5); margin-left: auto; text-align: right; line-height: 1.5; }

  .input-row { display: flex; align-items: center; gap: 16px; background: var(--brown-dark); border-radius: 16px; padding: 18px 22px; margin-bottom: 16px; flex-wrap: wrap; transition: background 0.3s ease; }
  body.light-mode .input-row { background: rgba(44,26,14,0.1); }

  .input-row label { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 1px; white-space: nowrap; transition: color 0.3s ease; }
  body.light-mode .input-row label { color: rgba(44,26,14,0.7); }

  .input-row input[type=number] { width: 80px; font-size: 22px; font-weight: 900; background: transparent; border: none; border-bottom: 2px solid var(--amber); color: var(--warm-white); text-align: center; padding: 4px 0; outline: none; font-family: 'Playfair Display', serif; transition: color 0.3s ease; }
  body.light-mode .input-row input[type=number] { color: var(--brown-dark); }

  .unit { font-size: 14px; color: var(--gold); transition: color 0.3s ease; }
  .total-display { margin-left: auto; display: flex; align-items: baseline; gap: 6px; }
  .total-num { font-size: 32px; font-weight: 900; color: var(--warm-white); font-family: 'Playfair Display', serif; transition: color 0.3s ease; }
  body.light-mode .total-num { color: var(--brown-dark); }
  .total-unit { font-size: 13px; color: rgba(255,255,255,0.5); transition: color 0.3s ease; }
  body.light-mode .total-unit { color: rgba(44,26,14,0.6); }

  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
  .preset-label { font-size: 11px; color: rgba(44,26,14,0.5); letter-spacing: 1px; transition: color 0.3s ease; }
  body.light-mode .preset-label { color: rgba(44,26,14,0.7); }

  .preset-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(212,137,42,0.3); color: var(--brown-mid); font-size: 12px; font-weight: 700; padding: 10px 14px; min-height: 44px; border-radius: 20px; cursor: pointer; font-family: 'Noto Serif TC', serif; transition: all 0.15s; }
  .preset-btn:hover { background: rgba(212,137,42,0.15); }
  .preset-btn:active { transform: scale(0.95); }
  .preset-btn.active { background: var(--amber); border-color: var(--amber); color: var(--brown-dark); }

  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
  .metric { background: var(--brown-dark); border-radius: 12px; padding: 10px; text-align: center; transition: background 0.3s ease; }
  body.light-mode .metric { background: rgba(44,26,14,0.1); }

  .metric-label { font-size: 9px; color: var(--gold); letter-spacing: 1.5px; margin-bottom: 4px; display: block; transition: color 0.3s ease; }
  .metric-value { font-size: 18px; font-weight: 900; color: var(--warm-white); font-family: 'Playfair Display', serif; transition: color 0.3s ease; }
  body.light-mode .metric-value { color: var(--brown-dark); }
  .metric-unit { font-size: 10px; color: rgba(255,255,255,0.4); transition: color 0.3s ease; }
  body.light-mode .metric-unit { color: rgba(44,26,14,0.6); }

  .timer-section {
    width: 100%; max-width: 820px; background: var(--cream); border-radius: 24px;
    padding: 24px; margin-bottom: 16px; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    transition: background-color 0.3s ease;
  }

  body.light-mode .timer-section { background: rgba(245,239,224,0.5); }

  .timer-title {
    font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700;
    color: var(--brown-dark); letter-spacing: 2px; margin-bottom: 12px;
    transition: color 0.3s ease;
  }

  .timer-display {
    display: flex; justify-content: center; align-items: center; gap: 12px;
    margin-bottom: 16px; font-size: 48px; font-weight: 900;
    font-family: 'Playfair Display', serif; color: var(--brown-dark);
    letter-spacing: 2px; transition: color 0.3s ease;
  }

  body.light-mode .timer-display { color: var(--brown-dark); }

  .timer-controls {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap;
  }

  .timer-btn {
    background: var(--brown-dark); color: var(--gold); border: none;
    padding: 10px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; font-family: 'Noto Serif TC', serif;
    min-height: 44px;
  }

  body.light-mode .timer-btn { background: rgba(44,26,14,0.2); color: var(--brown-dark); }

  .timer-btn:hover { background: var(--amber); color: var(--brown-dark); transform: translateY(-2px); }
  .timer-btn:active { transform: translateY(0); }
  .timer-btn.hidden { display: none; }

  .step-timer-indicator {
    background: rgba(212,137,42,0.1); border-left: 4px solid var(--amber);
    padding: 12px; border-radius: 8px; margin-bottom: 12px;
    font-size: 12px; color: var(--brown-dark); font-weight: 700;
    transition: all 0.3s ease;
  }

  .step-timer-indicator.active {
    background: rgba(212,137,42,0.25); border-left-color: var(--amber);
    animation: pulseLight 1s ease-in-out infinite;
  }

  .ratio-slider-section {
    background: rgba(212,137,42,0.08); border: 1px solid rgba(212,137,42,0.2);
    border-radius: 12px; padding: 14px; margin-bottom: 16px; transition: all 0.3s ease;
  }

  body.light-mode .ratio-slider-section {
    background: rgba(212,137,42,0.05); border-color: rgba(212,137,42,0.15);
  }

  .ratio-slider-label {
    font-size: 11px; font-weight: 700; color: var(--amber); margin-bottom: 8px;
    letter-spacing: 1px; transition: color 0.3s ease;
  }

  body.light-mode .ratio-slider-label { color: var(--brown-light); }

  .ratio-slider {
    width: 100%; height: 6px; border-radius: 3px; background: rgba(212,137,42,0.2);
    outline: none; -webkit-appearance: none; appearance: none; cursor: pointer;
  }

  .ratio-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--amber); cursor: pointer;
    transition: all 0.2s ease; box-shadow: 0 2px 6px rgba(212,137,42,0.4);
  }

  .ratio-slider::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%; background: var(--amber);
    cursor: pointer; border: none; transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(212,137,42,0.4);
  }

  .ratio-slider:hover::-webkit-slider-thumb { transform: scale(1.2); }
  .ratio-slider:hover::-moz-range-thumb { transform: scale(1.2); }

  .ratio-display {
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
    font-size: 12px; color: var(--brown-dark); font-weight: 700;
    transition: color 0.3s ease;
  }

  body.light-mode .ratio-display { color: var(--brown-mid); }

  .share-button {
    background: var(--amber); color: var(--brown-dark); border: none;
    padding: 10px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; font-family: 'Noto Serif TC', serif;
    width: 100%; min-height: 44px; margin-bottom: 16px;
  }

  .share-button:hover { background: var(--gold); transform: translateY(-2px); }
  .share-button:active { transform: translateY(0); }
  .share-button.copied { background: var(--brown-mid); }

  .steps-wrap { border-radius: 16px; overflow: hidden; border: 1px solid rgba(44,26,14,0.12); margin-bottom: 18px; transition: border-color 0.3s ease; }

  body.light-mode .steps-wrap { border-color: rgba(44,26,14,0.2); }

  .group-header-row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(212,137,42,0.1); transition: background 0.3s ease; }
  .group-header-row.green { background: rgba(92,51,23,0.07); }
  .group-bar { width: 3px; height: 14px; background: var(--amber); border-radius: 2px; flex-shrink: 0; }
  .group-bar.green { background: var(--brown-mid); }
  .group-header-text { font-size: 10px; font-weight: 700; color: var(--amber); letter-spacing: 1px; transition: color 0.3s ease; }
  .group-header-text.green { color: var(--brown-mid); }
  .step-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid rgba(44,26,14,0.08); background: var(--warm-white); transition: all 0.3s ease; }

  body.light-mode .step-row { background: rgba(245,239,224,0.8); }

  .step-row.active-step { background: rgba(212,137,42,0.12); }

  .step-badge { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; font-family: 'Playfair Display', serif; transition: all 0.3s ease; }
  .badge-a { background: var(--brown-dark); color: var(--gold); }
  .badge-b { background: var(--brown-mid); color: var(--gold); }
  .step-row.active-step .step-badge { box-shadow: 0 0 12px rgba(212,137,42,0.6); transform: scale(1.1); }

  .step-time { flex: 0 0 60px; font-size: 11px; color: var(--brown-light); transition: color 0.3s ease; }
  .step-action { flex: 1; font-size: 12px; font-weight: 700; color: var(--brown-dark); transition: color 0.3s ease; }
  .step-action small { display: block; font-size: 10px; font-weight: 400; color: rgba(44,26,14,0.45); margin-top: 2px; transition: color 0.3s ease; }
  .step-water-col { text-align: right; flex: 0 0 80px; }
  .step-water-col span { display: block; font-size: 16px; font-weight: 900; color: var(--brown-dark); font-family: 'Playfair Display', serif; transition: color 0.3s ease; }
  .step-water-col small { font-size: 10px; color: rgba(44,26,14,0.4); transition: color 0.3s ease; }

  .adjust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .adj-card { background: rgba(212,137,42,0.08); border: 1px solid rgba(212,137,42,0.2); border-radius: 12px; padding: 14px; transition: all 0.3s ease; }
  body.light-mode .adj-card { background: rgba(212,137,42,0.05); border-color: rgba(212,137,42,0.15); }
  .adj-card.blue { background: rgba(92,51,23,0.06); border-color: rgba(92,51,23,0.15); }
  body.light-mode .adj-card.blue { background: rgba(92,51,23,0.05); border-color: rgba(92,51,23,0.12); }
  .adj-title { font-size: 11px; font-weight: 700; color: var(--amber); margin-bottom: 8px; transition: color 0.3s ease; }
  body.light-mode .adj-title { color: var(--brown-light); }
  .adj-title.blue { color: var(--brown-mid); }
  .adj-row { font-size: 11px; color: rgba(44,26,14,0.6); margin-bottom: 3px; transition: color 0.3s ease; }
  body.light-mode .adj-row { color: rgba(44,26,14,0.7); }
  .adj-note { font-size: 10px; color: rgba(44,26,14,0.4); margin-top: 4px; transition: color 0.3s ease; }
  body.light-mode .adj-note { color: rgba(44,26,14,0.6); }

  .tips-box { background: var(--brown-dark); border-radius: 16px; padding: 16px 20px; transition: background 0.3s ease; }
  body.light-mode .tips-box { background: rgba(44,26,14,0.1); }
  .tips-title { font-size: 9px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; font-weight: 700; transition: color 0.3s ease; }
  .tip { display: flex; gap: 10px; margin-bottom: 7px; font-size: 11px; color: rgba(255,255,255,0.7); align-items: flex-start; transition: color 0.3s ease; }
  body.light-mode .tip { color: rgba(44,26,14,0.7); }
  .tip-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--amber); margin-top: 5px; flex-shrink: 0; }
  .tip strong { color: var(--gold); transition: color 0.3s ease; }
  body.light-mode .tip strong { color: var(--brown-light); }

  @media (max-width: 700px) {
    .method-cards { grid-template-columns: repeat(2,1fr); }
    .summary-grid { grid-template-columns: repeat(2,1fr); }
    .calc-method-desc { display: none; }
    .timer-display { font-size: 42px; }
    .adjust-grid { grid-template-columns: 1fr; }
    .method-card { padding: 14px 10px; min-height: 100px; }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .dark-mode-toggle { top: 12px; right: 12px; padding: 8px 12px; font-size: 16px; }
    .page-h1 { font-size: 26px; }
    .calculator { padding: 16px; border-radius: 18px; margin-bottom: 12px; }
    .timer-section { padding: 16px; border-radius: 18px; margin-bottom: 12px; }

    .method-card { padding: 12px 8px; }
    .method-name { font-size: 11px; }
    .input-row { padding: 14px 16px; }

  noscript {
    display: block; padding: 20px; text-align: center; color: var(--warm-white);

<body>

<noscript>
  <div>請啟用 JavaScript 以使用此應用程式。This application requires JavaScript to function.</div>
</noscript>

<button class="dark-mode-toggle" id="darkModeToggle" title="切換深色/淺色模式" aria-label="Toggle dark and light mode">🌙</button>

<main>
<div class="page-header">
  <div class="page-title">Pour Over Lab</div>
  <h1 class="page-h1">手沖咖啡實驗室</h1>
  <p class="page-sub">選擇沖法，輸入咖啡粉量，即時換算水量</p>
</div>

<nav class="method-selector" role="tablist">
  <div class="selector-label">選擇你的沖法</div>
  <div class="method-cards">
    <div class="method-card" onclick="selectMethod('sweet')" id="btn-sweet" role="tab" aria-selected="false" tabindex="0">
      <div class="method-icon">🍯</div>
      <div class="method-name">超高甜感</div>
      <div class="method-ratio">1:15 · 4段注水</div>
      <span class="method-tag">搖晃濾杯</span>
    </div>
    <div class="method-card active" onclick="selectMethod('kasuya')" id="btn-kasuya" role="tab" aria-selected="true" tabindex="0">
      <div class="method-icon">🏆</div>
      <div class="method-name">Kasuya 4:6</div>
      <div class="method-ratio">1:15 · 5段注水</div>
      <span class="method-tag">世界冠軍</span>
    </div>
    <div class="method-card" onclick="selectMethod('hoffmann')" id="btn-hoffmann" role="tab" aria-selected="false" tabindex="0">
      <div class="method-icon">🌊</div>
      <div class="method-name">Hoffmann</div>
      <div class="method-ratio">1:16.7 · 2段注水</div>
      <span class="method-tag">攪拌拉平</span>
    </div>
    <div class="method-card" onclick="selectMethod('rao')" id="btn-rao" role="tab" aria-selected="false" tabindex="0">
      <div class="method-icon">🌀</div>
      <div class="method-name">Scott Rao</div>
      <div class="method-ratio">1:16 · 連續注水</div>
      <span class="method-tag">螺旋渦流</span>
    </div>
  </div>
</nav>

<section class="calculator" id="calculator" role="main">
  <div class="calc-method-header">
    <span class="calc-method-badge" id="method-badge" aria-label="沖法標籤">世界冠軍</span>
    <span class="calc-method-title" id="method-title" aria-label="沖法名稱">Tetsu Kasuya 4:6 法</span>
    <span class="calc-method-desc" id="method-desc" aria-label="沖法描述">精準控制甜感與酸度<br>2016 世界沖煮杯冠軍</span>
  </div>
  <div class="input-row">
    <label for="dose">咖啡粉</label>
    <input type="number" id="dose" value="20" min="10" max="60" step="1" oninput="calculate()" aria-label="咖啡粉克數">
    <span class="unit">克</span>
    <div class="total-display">
      <span class="total-num" id="total-water" aria-live="polite">300</span>
      <span class="total-unit">g 水</span>
    </div>
  </div>
  <div class="preset-row">
    <span class="preset-label">快速選擇：</span>
    <button class="preset-btn" onclick="setDose(15)" aria-label="選擇15克咖啡粉">15g</button>
    <button class="preset-btn active" onclick="setDose(20)" aria-label="選擇20克咖啡粉">20g</button>
    <button class="preset-btn" onclick="setDose(25)" aria-label="選擇25克咖啡粉">25g</button>
    <button class="preset-btn" onclick="setDose(30)" aria-label="選擇30克咖啡粉">30g</button>
    <button class="preset-btn" onclick="setDose(40)" aria-label="選擇40克咖啡粉">40g</button>
  </div>

  <div class="ratio-slider-section" id="ratioSliderSection">
    <div class="ratio-slider-label">粉水比率</div>
    <input type="range" id="ratioSlider" class="ratio-slider" min="14" max="18" step="0.5" value="15" oninput="updateRatio()" aria-label="調整粉水比率">
    <div class="ratio-display">
      <span>1 : <span id="ratioValue">15</span></span>
      <span id="ratioNote" style="font-size: 10px; color: rgba(44,26,14,0.5); transition: color 0.3s ease;">標準</span>
    </div>
  </div>

  <button class="share-button" id="shareBtn" onclick="copyRecipe()" aria-label="複製配方到剪貼簿">📋 複製配方</button>

  <div class="summary-grid" id="summary-grid"></div>
  <div class="steps-wrap" id="steps-wrap"></div>
  <div class="adjust-grid" id="adjust-grid"></div>
  <div class="tips-box" id="tips-box"></div>
</section>

<section class="timer-section" id="timerSection" role="region" aria-label="沖煮計時器">
  <div class="timer-title">沖煮計時器</div>
  <div class="step-timer-indicator" id="stepIndicator">準備開始...</div>
  <div class="timer-display" id="timerDisplay">0:00</div>
  <div class="timer-controls">
    <button class="timer-btn" id="timerStartBtn" onclick="startTimer()" aria-label="開始計時器">開始</button>
    <button class="timer-btn hidden" id="timerPauseBtn" onclick="pauseTimer()" aria-label="暫停計時器">暫停</button>
    <button class="timer-btn" id="timerResumeBtn" onclick="resumeTimer()" aria-label="繼續計時器" style="display:none;">繼續</button>
    <button class="timer-btn" id="timerResetBtn" onclick="resetTimer()" aria-label="重置計時器">重置</button>
  </div>
</section>
</main>

<script>
  // Dark mode toggle
  const darkModeToggle = document.getElementById('darkModeToggle');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedMode = localStorage.getItem('darkMode');

  if (savedMode === 'light' || (savedMode === null && !prefersDark)) {
    document.body.classList.add('light-mode');
    darkModeToggle.textContent = '☀️';
  }

  darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    darkModeToggle.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('darkMode', isLight ? 'light' : 'dark');
  });

  // Service worker registration for PWA support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZXZlbnQgPT4gZXZlbnQud2FpdFVudGlsKHNlbGYuc2tpcFdhaXRpbmcoKSk7IHNlbGYuYWRkRXZlbnRMaXN0ZW5lcignYWN0aXZhdGUnLCBldmVudCA9PiBldmVudC53YWl0VW50aWwoY2xpZW50cy5jbGFpbSgpKSk7').catch(() => {});
  }

  const METHODS = {
    sweet: {
      badge:'超高甜感', title:'超高甜感 Recipe', desc:'搖晃濾杯萃取甜感<br>4段注水法',
      ratio:15, temp:'92°C', grind:'中細研磨', time:'2:30',
      tips:[{label:'水溫',text:'92°C，不宜過高'},{label:'第一段',text:'一口氣注入，立刻大幅搖晃濾杯約5秒'},{label:'研磨',text:'中細研磨'},{label:'注水',text:'第二段稍快，三四段慢慢注水'}],
      buildSummary:(dose,total)=>{
        const s1=Math.round(dose*3.5),s2=Math.round(total*0.6),s3=Math.round(total*0.767);
        return [{label:'第一段',value:s1,unit:'g'},{label:'至第二段',value:s2,unit:'g'},{label:'至第三段',value:s3,unit:'g'},{label:'總水量',value:total,unit:'g'}];
      },
      buildSteps:(dose,total)=>{
        const s1=Math.round(dose*3.5),s2=Math.round(total*0.6),s3=Math.round(total*0.767);
        return {groups:[{label:'4段注水',color:'amber',steps:[
          {num:1,time:'0:00',title:'第一段注水',note:'一口氣注入，立刻大幅搖晃濾杯約5秒',water:s1,cum:s1,duration:0},
          {num:2,time:'稍快',title:'第二段注水',note:'稍快注水至目標',water:s2-s1,cum:s2,duration:30},
          {num:3,time:'≈ 1:15',title:'第三段注水',note:'慢慢注水',water:s3-s2,cum:s3,duration:75},
          {num:4,time:'≈ 1:50',title:'第四段注水',note:'慢慢注水至完成',water:total-s3,cum:total,duration:110},
        ]}]};
      },
      buildAdjust:()=>null,
    },
    kasuya: {
      badge:'世界冠軍', title:'Tetsu Kasuya 4:6 法', desc:'精準控制甜感與酸度<br>2016 世界沖煮杯冠軍',
      ratio:15, temp:'93°C', grind:'中粗研磨', time:'3:30',
      tips:[{label:'水溫',text:'93°C，淺焙可到96°C'},{label:'研磨',text:'中粗研磨，比一般V60稍粗'},{label:'等待',text:'每段必須等水完全滴完再注下一段'},{label:'注水',text:'由中心螺旋向外，避免直接沖濾紙'}],
      buildSummary:(dose,total)=>{
        const pA=Math.round(total*0.4),pB=total-pA,eB=Math.round(pB/3);
        return [{label:'前段 40%',value:pA,unit:'g'},{label:'後段 60%',value:pB,unit:'g'},{label:'後三段各',value:eB,unit:'g×3'},{label:'總水量',value:total,unit:'g'}];
      },
      buildSteps:(dose,total)=>{
        const pA=Math.round(total*0.4),pB=total-pA,eB=Math.round(pB/3),s1=Math.round(pA*0.4),s2=pA-s1;
        return {groups:[
          {label:'前 40% — 決定甜酸比例',color:'amber',steps:[
            {num:1,time:'0:00',title:'第一段注水',note:'由中心螺旋向外，等待完全滴完',water:s1,cum:s1,duration:0},
            {num:2,time:'滴完後',title:'第二段注水',note:'完成前 40%，等待滴完',water:s2,cum:pA,duration:45},
          ]},
          {label:'後 60% — 決定濃淡強度',color:'green',steps:[
            {num:3,time:'≈ 1:15',title:'第三段注水',note:'等待滴完後繼續',water:eB,cum:pA+eB,duration:75},
            {num:4,time:'≈ 2:00',title:'第四段注水',note:'等待滴完後繼續',water:eB,cum:pA+eB*2,duration:120},
            {num:5,time:'≈ 2:45',title:'第五段注水',note:'完成！目標 3:30 前滴完',water:pB-eB*2,cum:total,duration:165},
          ]},
        ]};
      },
      buildAdjust:(dose,total)=>{
        const pA=Math.round(total*0.4),s1=Math.round(pA*0.4);
        const sw1=Math.round(s1*0.8),sw2=pA-sw1,ac1=Math.round(s1*1.2),ac2=pA-ac1;
        return {
          left:{icon:'🍯',title:'想要更甜',rows:[`段 1 減少 → ${sw1}g`,`段 2 補回 → ${sw2}g`],note:'前段合計仍為 40%'},
          right:{icon:'🍋',title:'想要更酸',rows:[`段 1 增加 → ${ac1}g`,`段 2 減少 → ${ac2}g`],note:'前段合計仍為 40%'},
        };
      },
    },
    hoffmann: {
      badge:'James Hoffmann', title:'James Hoffmann 法', desc:'均衡乾淨，入門首選<br>中細研磨 · 搖晃拉平',
      ratio:16.7, temp:'96°C', grind:'中細研磨', time:'3:30',
      tips:[{label:'水溫',text:'接近沸騰，96°C 或更高'},{label:'研磨',text:'中細研磨，一致性很重要'},{label:'攪拌',text:'第二段後順時針逆時針各攪拌一圈'},{label:'搖晃',text:'最後輕搖讓粉床平整，萃取更均勻'}],
      buildSummary:(dose,total)=>{
        const bloom=Math.round(dose*2),mid=Math.round(total*0.6);
        return [{label:'悶蒸水量',value:bloom,unit:'g'},{label:'第一主注',value:mid,unit:'g'},{label:'第二主注',value:total,unit:'g'},{label:'總水量',value:total,unit:'g'}];
      },
      buildSteps:(dose,total)=>{
        const bloom=Math.round(dose*2),mid=Math.round(total*0.6);
        return {groups:[{label:'2段注水 + 攪拌',color:'amber',steps:[
          {num:1,time:'0:00',title:'悶蒸注水',note:`注入 ${bloom}g（粉量2倍），輕搖讓粉床平整，等45秒`,water:bloom,cum:bloom,duration:0},
          {num:2,time:'0:45',title:'第一主注水',note:`注水至 ${mid}g，約30秒內完成`,water:mid-bloom,cum:mid,duration:45},
          {num:3,time:'1:15',title:'第二主注水',note:`注水至 ${total}g，約30秒內完成`,water:total-mid,cum:total,duration:75},
          {num:4,time:'注完後',title:'攪拌 + 搖晃',note:'順逆時針各攪拌一圈，再輕搖讓粉床平整',water:0,cum:total,duration:90},
        ]}]};
      },
      buildAdjust:()=>({
        left:{icon:'☕',title:'更濃郁',rows:['粉水比改為 1:15','研磨稍微調細'],note:'保持相同步驟'},
        right:{icon:'🍵',title:'更清淡',rows:['粉水比改為 1:18','研磨稍微調粗'],note:'保持相同步驟'},
      }),
    },
    rao: {
      badge:'Scott Rao', title:'Scott Rao 渦流法', desc:'層次豐富、有厚度<br>螺旋渦流萃取',
      ratio:16, temp:'94°C', grind:'中細研磨', time:'3:00',
      tips:[{label:'水溫',text:'93–94°C，保持穩定'},{label:'渦流',text:'注水時製造明顯螺旋渦流，讓萃取更均勻'},{label:'研磨',text:'中細研磨，比 Kasuya 稍細'},{label:'搖晃',text:'最後輕搖 V60 讓粉床平整再等待滴完'}],
      buildSummary:(dose,total)=>{
        const bloom=Math.round(dose*2);
        return [{label:'悶蒸水量',value:bloom,unit:'g'},{label:'主注水',value:total-bloom,unit:'g'},{label:'目標時間',value:'3:00',unit:''},{label:'總水量',value:total,unit:'g'}];
      },
      buildSteps:(dose,total)=>{
        const bloom=Math.round(dose*2);
        return {groups:[{label:'連續螺旋注水',color:'amber',steps:[
          {num:1,time:'0:00',title:'悶蒸注水',note:`注入 ${bloom}g（粉量2倍），等待45秒`,water:bloom,cum:bloom,duration:0},
          {num:2,time:'0:45',title:'主注水',note:`以螺旋方式由中心向外繞圈，穩定注到 ${total}g`,water:total-bloom,cum:total,duration:45},
          {num:3,time:'注完後',title:'搖晃收尾',note:'輕搖 V60 讓粉床平整，等待滴完',water:0,cum:total,duration:120},
        ]}]};
      },
      buildAdjust:()=>({
        left:{icon:'🌀',title:'渦流更強',rows:['提高注水高度','加快注水速度'],note:'增加擾動萃取更均勻'},
        right:{icon:'💧',title:'更溫和',rows:['降低注水高度','放慢注水速度'],note:'減少擾動風味更乾淨'},
      }),
    },
  };

  let currentMethod = 'kasuya';
  let customRatio = 15;
  let timerInterval = null;
  let timerSeconds = 0;
  let timerRunning = false;
  let allSteps = [];

  function selectMethod(id) {
    currentMethod = id;
    document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('[role="tab"]').forEach(t => t.setAttribute('aria-selected', 'false'));
    const selected = document.getElementById('btn-' + id);
    selected.classList.add('active');
    selected.setAttribute('aria-selected', 'true');
    calculate();
    resetTimer();
  }

  function setDose(v) {
    document.getElementById('dose').value = v;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === v));
    calculate();
  }

  function updateRatio() {
    customRatio = parseFloat(document.getElementById('ratioSlider').value);
    const note = document.getElementById('ratioNote');
    if (customRatio < 15) note.textContent = '更濃郁';
    else if (customRatio > 15) note.textContent = '更清淡';
    else note.textContent = '標準';
    document.getElementById('ratioValue').textContent = customRatio.toFixed(1);
    calculate();
  }

  function calculate() {
    const dose = Math.max(10, Math.min(60, parseInt(document.getElementById('dose').value) || 20));
    const m = METHODS[currentMethod];
    const total = Math.round(dose * customRatio);

    document.getElementById('method-badge').textContent = m.badge;
    document.getElementById('method-title').textContent = m.title;
    document.getElementById('method-desc').innerHTML = m.desc;
    document.getElementById('total-water').textContent = total;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === dose));

    document.getElementById('summary-grid').innerHTML = m.buildSummary(dose, total).map(item =>
      `<div class="metric"><span class="metric-label">${item.label}</span><div class="metric-value">${item.value}</div><div class="metric-unit">${item.unit}</div></div>`
    ).join('');

    const stepsData = m.buildSteps(dose, total);
    allSteps = [];
    let html = '';
    stepsData.groups.forEach((group, gi) => {
      const g = group.color === 'green';
      html += `<div class="group-header-row ${g?'green':''}"><div class="group-bar ${g?'green':''}"></div><span class="group-header-text ${g?'green':''}">${group.label}</span></div>`;
      group.steps.forEach((step, si) => {
        const last = gi === stepsData.groups.length-1 && si === group.steps.length-1;
        const wtr = step.water > 0 ? `<span>${step.water}g</span><small>累計 ${step.cum}g</small>` : `<span style="font-size:11px;color:rgba(44,26,14,0.4);">—</span>`;
        html += `<div class="step-row" id="step-${gi}-${si}" style="${last?'border-bottom:none;':''}"><div class="step-badge ${g?'badge-b':'badge-a'}">${step.num}</div><div class="step-time">${step.time}</div><div class="step-action">${step.title}<small>${step.note}</small></div><div class="step-water-col">${wtr}</div></div>`;
        allSteps.push({row:document.getElementById(`step-${gi}-${si}`),duration:step.duration,num:step.num,title:step.title});
      });
    });
    document.getElementById('steps-wrap').innerHTML = html;
    allSteps.forEach((s,i) => s.row = document.getElementById(`step-${Math.floor(i/10)}-${i%10}`));

    const adj = m.buildAdjust(dose, total);
    if (adj) {
      document.getElementById('adjust-grid').style.display = 'grid';
      document.getElementById('adjust-grid').innerHTML = `
        <div class="adj-card"><div class="adj-title">${adj.left.icon} ${adj.left.title}</div>${adj.left.rows.map(r=>`<div class="adj-row">${r}</div>`).join('')}<div class="adj-note">${adj.left.note}</div></div>
        <div class="adj-card blue"><div class="adj-title blue">${adj.right.icon} ${adj.right.title}</div>${adj.right.rows.map(r=>`<div class="adj-row">${r}</div>`).join('')}<div class="adj-note">${adj.right.note}</div></div>`;
    } else {
      document.getElementById('adjust-grid').style.display = 'none';
    }

    document.getElementById('tips-box').innerHTML = `<div class="tips-title">沖煮要訣 · ${m.temp} · ${m.grind} · 目標 ${m.time}</div>${m.tips.map(t=>`<div class="tip"><div class="tip-dot"></div><span><strong>${t.label}：</strong>${t.text}</span></div>`).join('')}`;
  }

  function startTimer() {
    timerRunning = true;
    timerSeconds = 0;
    document.getElementById('timerStartBtn').classList.add('hidden');
    document.getElementById('timerPauseBtn').classList.remove('hidden');
    document.getElementById('timerResumeBtn').style.display = 'none';

    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
      updateStepIndicator();
    }, 1000);
  }

  function pauseTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('timerPauseBtn').classList.add('hidden');
    document.getElementById('timerResumeBtn').style.display = 'inline-block';
  }

  function resumeTimer() {
    timerRunning = true;
    document.getElementById('timerResumeBtn').style.display = 'none';
    document.getElementById('timerPauseBtn').classList.remove('hidden');

    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
      updateStepIndicator();
    }, 1000);
  }

  function resetTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
    timerSeconds = 0;
    updateTimerDisplay();
    document.getElementById('timerStartBtn').classList.remove('hidden');
    document.getElementById('timerPauseBtn').classList.add('hidden');
    document.getElementById('timerResumeBtn').style.display = 'none';
    document.getElementById('stepIndicator').textContent = '準備開始...';
    document.getElementById('stepIndicator').classList.remove('active');
    document.querySelectorAll('.step-row').forEach(r => r.classList.remove('active-step'));
  }

  function updateTimerDisplay() {
    const mins = Math.floor(timerSeconds / 60);
    const secs = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent =
      `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function updateStepIndicator() {
    const m = METHODS[currentMethod];
    const stepsData = m.buildSteps(parseInt(document.getElementById('dose').value), parseInt(document.getElementById('total-water').textContent));
    let currentStep = null;
    let nextStep = null;
    let allStepsList = [];

    stepsData.groups.forEach(group => {
      group.steps.forEach(step => allStepsList.push(step));
    });

    for (let i = 0; i < allStepsList.length; i++) {
      if (timerSeconds >= allStepsList[i].duration) {
        currentStep = allStepsList[i];
      }
      if (!nextStep && timerSeconds < allStepsList[i].duration) {
        nextStep = allStepsList[i];
      }
    }

    document.querySelectorAll('.step-row').forEach(r => r.classList.remove('active-step'));

    if (currentStep) {
      const indicator = document.getElementById('stepIndicator');
      indicator.textContent = `正在進行：第 ${currentStep.num} 步 · ${currentStep.title}`;
      indicator.classList.add('active');

      const currentStepRow = document.querySelector(`[id^="step-"][id$="${allStepsList.indexOf(currentStep)}"]`) ||
                           document.evaluate(
                             `//div[contains(@class, 'step-row') and contains(., '${currentStep.num}')]`,
                             document,
                             null,
                             XPathResult.FIRST_ORDERED_NODE_TYPE,
                             null
                           ).singleNodeValue;
      if (currentStepRow) currentStepRow.classList.add('active-step');
    }
  }

  function copyRecipe() {
    const dose = document.getElementById('dose').value;
    const water = document.getElementById('total-water').textContent;
    const m = METHODS[currentMethod];
    const stepsData = m.buildSteps(parseInt(dose), parseInt(water));

    let recipe = `手沖咖啡配方 ☕\n`;
    recipe += `沖法：${m.title}\n`;
    recipe += `咖啡粉：${dose}克\n`;
    recipe += `水量：${water}克\n`;
    recipe += `粉水比：1:${customRatio.toFixed(1)}\n`;
    recipe += `水溫：${m.temp}\n`;
    recipe += `研磨度：${m.grind}\n`;
    recipe += `目標時間：${m.time}\n\n`;
    recipe += `沖煮步驟：\n`;

    stepsData.groups.forEach(group => {
      recipe += `${group.label}\n`;
      group.steps.forEach(step => {
        recipe += `  ${step.num}. ${step.title} (${step.time})\n`;
        if (step.water > 0) recipe += `     注水：${step.water}克 (累計${step.cum}克)\n`;
        recipe += `     ${step.note}\n`;
      });
    });

    navigator.clipboard.writeText(recipe).then(() => {
      const btn = document.getElementById('shareBtn');
      const originalText = btn.textContent;
      btn.textContent = '✓ 已複製！';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => alert('複製失敗，請重試'));
  }

  calculate();
</script>
</body>
</html>
